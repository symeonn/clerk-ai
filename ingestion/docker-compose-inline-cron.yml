version: '3.8'

services:
  slack-ingestion:
    image: python:3.11-slim
    container_name: slack-ingestion
    restart: unless-stopped
    
    environment:
      # Slack API token (REQUIRED)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      
      # Config path
      - CONFIG_PATH=/app/config.yaml
      
      # Python unbuffered output for real-time logs
      - PYTHONUNBUFFERED=1
      
      # Crontab content as environment variable
      - CRON_SCHEDULE=*/5 * * * * cd /app/app && python your_script.py >> /var/log/cron.log 2>&1
    
    volumes:
      # Mount application code
      - ./app:/app/app:ro
      
      # Mount configuration
      - ./config.yaml:/app/config.yaml:ro
      
      # Mount inbox directory (persistent storage)
      - ../vault/00_inbox:/app/data/00_inbox
      
      # Mount attachments directory for media files
      - ../vault/Attachments:/app/data/Attachments
    
    # Install dependencies and run cron
    command: >
      bash -c "
        pip install --no-cache-dir requests pyyaml &&
        apt-get update &&
        apt-get install -y cron &&
        echo \"$$CRON_SCHEDULE\" > /etc/cron.d/ingestion-cron &&
        echo \"\" >> /etc/cron.d/ingestion-cron &&
        chmod 0644 /etc/cron.d/ingestion-cron &&
        crontab /etc/cron.d/ingestion-cron &&
        touch /var/log/cron.log &&
        cron &&
        echo 'Cron daemon started. Tailing logs...' &&
        tail -f /var/log/cron.log
      "

    working_dir: /app/app
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"