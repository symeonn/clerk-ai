# Slack Ingestion Configuration

# Polling configuration
poll:
  # How far back to fetch messages (in minutes)
  # Recommended: Set slightly longer than cron interval to avoid gaps
  lookback_minutes: 15

# File system paths (container paths)
paths:
  # Inbox directory for raw messages
  inbox: /app/data/00_inbox
  
  # Metadata directory for run logs
  metadata: /app/data/00_inbox/_meta
  
  # Attachments directory for media files (images, audio, video)
  # Media files will be stored here and linked in markdown notes
  attachments: /app/data/Attachments

# Obsidian configuration for generating mobile-friendly URLs
obsidian:
  # Vault name (required for Obsidian URLs)
  # This should match your Obsidian vault name exactly
  vault_name: vault
  
  # Folder path within vault where inbox files are stored
  # This is relative to the vault root
  inbox_folder: 00_inbox
  
  # Enable/disable Slack replies with Obsidian URLs
  enable_slack_replies: true
